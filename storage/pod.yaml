apiVersion: v1
kind: Pod

metadata:
  name: storage-pod

spec:
  containers:
  - name: storage-container
    image: nginx

    volumeMounts:
    - mountPath: "/usr/share/nginx/html"
      name: storage-volume

  volumes:
  - name: storage-volume
    persistentVolumeClaim:
      claimName: local-pvc
