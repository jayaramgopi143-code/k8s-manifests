apiVersion: apps/v1
kind: Deployment

metadata:
  name: config-demo-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: config-demo

  template:
    metadata:
      labels:
        app: config-demo

    spec:
      containers:
      - name: config-demo-container
        image: devops-node-app
        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
